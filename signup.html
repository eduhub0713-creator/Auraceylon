<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="assets/logo.jpg" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Create Account | Aura Ceylon</title>
  <meta name="description" content="Create your Aura Ceylon account." />
  <meta name="theme-color" content="#000000" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 20px 60px;
      background:
        radial-gradient(circle at top, rgba(212, 175, 55, 0.14), transparent 34%),
        linear-gradient(to bottom, #050505, #000000);
    }

    .auth-card {
      width: 100%;
      max-width: 500px;
      padding: 34px;
      border-radius: 24px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.035), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .auth-logo {
      width: 86px;
      height: 86px;
      object-fit: cover;
      border-radius: 50%;
      margin: 0 auto 18px;
      border: 1px solid var(--border-strong);
    }

    .auth-card h1 {
      font-family: "Playfair Display", serif;
      text-align: center;
      font-size: 34px;
      margin-bottom: 8px;
    }

    .auth-card p {
      text-align: center;
      color: var(--text-soft);
      margin-bottom: 24px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .auth-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .auth-group label {
      color: var(--gold-soft);
      font-size: 14px;
    }

    .auth-group input {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0a0a0a;
      color: var(--text);
    }

    .auth-group input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 52px;
    }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold-soft);
      font-size: 18px;
    }

    .auth-links {
      text-align: center;
      font-size: 14px;
      margin-top: 4px;
    }

    .auth-links a {
      color: var(--gold-soft);
    }

    .google-btn {
      width: 100%;
      margin-top: 14px;
      border: 1px solid var(--border-strong);
      color: var(--gold-soft);
      background: transparent;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      margin: 20px 0 6px;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-message {
      margin-top: 14px;
      text-align: center;
      color: var(--gold-soft);
      font-size: 14px;
      min-height: 22px;
    }

    @media (max-width: 520px) {
      .auth-card {
        padding: 26px 20px;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand">
        <img src="assets/logo.jpg" alt="Aura Ceylon Logo" class="brand-logo" />
        <div class="brand-text">
          <span class="brand-name">AURA CEYLON</span>
          <span class="brand-tagline">Elegant • Timeless • Premium</span>
        </div>
      </a>

      <button class="menu-toggle" id="menuToggle" aria-label="Open menu">☰</button>

      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html">Cart <span id="cartCount">0</span></a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <img src="assets/logo.jpg" alt="Aura Ceylon Logo" class="auth-logo" />

      <h1>Create Account</h1>
      <p>Join Aura Ceylon and enjoy a personalized shopping experience.</p>

      <form class="auth-form" id="signupForm">
        <div class="auth-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="Your full name" required />
        </div>

        <div class="auth-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="auth-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="Create a password" required minlength="6" />
            <button type="button" class="eye-btn" id="togglePassword">👁</button>
          </div>
        </div>

        <div class="auth-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrap">
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required minlength="6" />
            <button type="button" class="eye-btn" id="toggleConfirmPassword">👁</button>
          </div>
        </div>

        <button type="submit" class="btn btn-gold">Create Account</button>

        <div class="auth-links">
          Already have an account? <a href="login.html">Login</a>
        </div>
      </form>

      <div class="auth-divider">or</div>

      <button class="btn google-btn" id="googleSignupBtn">
        Continue with Google
      </button>

      <div class="auth-message" id="authMessage"></div>
    </section>
  </main>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>

  <!-- App Scripts -->
  <script src="js/pwa.js"></script>
  <script src="js/ui.js"></script>

  <script>
    const signupForm = document.getElementById("signupForm");
    const fullNameInput = document.getElementById("fullName");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const togglePassword = document.getElementById("togglePassword");
    const toggleConfirmPassword = document.getElementById("toggleConfirmPassword");
    const googleSignupBtn = document.getElementById("googleSignupBtn");
    const authMessage = document.getElementById("authMessage");

    function showAuthMessage(message) {
      authMessage.textContent = message;
    }

    function togglePasswordVisibility(input, button) {
      const isPassword = input.type === "password";
      input.type = isPassword ? "text" : "password";
      button.textContent = isPassword ? "🙈" : "👁";
    }

    togglePassword.addEventListener("click", () => {
      togglePasswordVisibility(passwordInput, togglePassword);
    });

    toggleConfirmPassword.addEventListener("click", () => {
      togglePasswordVisibility(confirmPasswordInput, toggleConfirmPassword);
    });

    async function createUserProfile(user, fullName) {
      await db.collection("users").doc(user.uid).set(
        {
          uid: user.uid,
          fullName: fullName || user.displayName || "",
          email: user.email,
          photoURL: user.photoURL || "",
          provider: user.providerData[0]?.providerId || "password",
          cart: [],
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        },
        { merge: true }
      );
    }

    signupForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const fullName = fullNameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (password !== confirmPassword) {
        showAuthMessage("Passwords do not match.");
        return;
      }

      if (password.length < 6) {
        showAuthMessage("Password must be at least 6 characters.");
        return;
      }

      try {
        showAuthMessage("Creating account...");

        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        await user.updateProfile({
          displayName: fullName
        });

        await createUserProfile(user, fullName);

        showAuthMessage("Account created successfully.");
        showToast("Account created successfully");

        setTimeout(() => {
          window.location.href = "index.html";
        }, 900);
      } catch (error) {
        console.error(error);
        showAuthMessage(error.message);
      }
    });

    googleSignupBtn.addEventListener("click", async () => {
      try {
        showAuthMessage("Opening Google signup...");

        const provider = new firebase.auth.GoogleAuthProvider();

        provider.setCustomParameters({
          prompt: "select_account"
        });

        const result = await auth.signInWithPopup(provider);
        const user = result.user;

        await createUserProfile(user, user.displayName);

        showAuthMessage("Google signup successful.");
        showToast("Google signup successful");

        setTimeout(() => {
          window.location.href = "index.html";
        }, 900);
      } catch (error) {
        console.error(error);
        showAuthMessage(error.message);
      }
    });
  </script>
</body>
</html>
