<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="assets/logo.jpg" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | Aura Ceylon</title>
  <meta name="description" content="Login to your Aura Ceylon account." />
  <meta name="theme-color" content="#000000" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 20px 60px;
      background:
        radial-gradient(circle at top, rgba(212, 175, 55, 0.14), transparent 34%),
        linear-gradient(to bottom, #050505, #000000);
    }

    .auth-card {
      width: 100%;
      max-width: 460px;
      padding: 34px;
      border-radius: 24px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.035), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .auth-logo {
      width: 86px;
      height: 86px;
      object-fit: cover;
      border-radius: 50%;
      margin: 0 auto 18px;
      border: 1px solid var(--border-strong);
    }

    .auth-card h1 {
      font-family: "Playfair Display", serif;
      text-align: center;
      font-size: 34px;
      margin-bottom: 8px;
    }

    .auth-card p {
      text-align: center;
      color: var(--text-soft);
      margin-bottom: 24px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .auth-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .auth-group label {
      color: var(--gold-soft);
      font-size: 14px;
    }

    .auth-group input {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0a0a0a;
      color: var(--text);
    }

    .auth-group input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 52px;
    }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold-soft);
      font-size: 18px;
    }

    .auth-links {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
      margin-top: 4px;
    }

    .auth-links a {
      color: var(--gold-soft);
    }

    .google-btn {
      width: 100%;
      margin-top: 14px;
      border: 1px solid var(--border-strong);
      color: var(--gold-soft);
      background: transparent;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      margin: 20px 0 6px;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-message {
      margin-top: 14px;
      text-align: center;
      color: var(--gold-soft);
      font-size: 14px;
      min-height: 22px;
    }

    @media (max-width: 520px) {
      .auth-card {
        padding: 26px 20px;
      }

      .auth-links {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand">
        <img src="assets/logo.jpg" alt="Aura Ceylon Logo" class="brand-logo" />
        <div class="brand-text">
          <span class="brand-name">AURA CEYLON</span>
          <span class="brand-tagline">Elegant • Timeless • Premium</span>
        </div>
      </a>

      <button class="menu-toggle" id="menuToggle" aria-label="Open menu">☰</button>

      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html">Cart <span id="cartCount">0</span></a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <img src="assets/logo.jpg" alt="Aura Ceylon Logo" class="auth-logo" />

      <h1>Welcome Back</h1>
      <p>Login to continue shopping with Aura Ceylon.</p>

      <form class="auth-form" id="loginForm">
        <div class="auth-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="auth-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="Enter your password" required />
            <button type="button" class="eye-btn" id="togglePassword">👁</button>
          </div>
        </div>

        <button type="submit" class="btn btn-gold">Login</button>

        <div class="auth-links">
          <a href="forgot-password.html">Forgot password?</a>
          <a href="signup.html">Create account</a>
        </div>
      </form>

      <div class="auth-divider">or</div>

      <button class="btn google-btn" id="googleLoginBtn">
        Continue with Google
      </button>

      <div class="auth-message" id="authMessage"></div>
    </section>
  </main>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>

  <!-- App Scripts -->
  <script src="js/pwa.js"></script>
  <script src="js/ui.js"></script>

  <script>
    const loginForm = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");
    const googleLoginBtn = document.getElementById("googleLoginBtn");
    const authMessage = document.getElementById("authMessage");

    function showAuthMessage(message) {
      authMessage.textContent = message;
    }

    togglePassword.addEventListener("click", () => {
      const isPassword = passwordInput.type === "password";
      passwordInput.type = isPassword ? "text" : "password";
      togglePassword.textContent = isPassword ? "🙈" : "👁";
    });

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      try {
        showAuthMessage("Logging in...");

        await auth.signInWithEmailAndPassword(email, password);

        showAuthMessage("Login successful.");
        showToast("Login successful");

        setTimeout(() => {
          const redirect = localStorage.getItem("redirectAfterLogin");
          localStorage.removeItem("redirectAfterLogin");

          window.location.href = redirect || "index.html";
        }, 700);
      } catch (error) {
        console.error(error);
        showAuthMessage(error.message);
      }
    });

    googleLoginBtn.addEventListener("click", async () => {
      try {
        showAuthMessage("Opening Google login...");

        const provider = new firebase.auth.GoogleAuthProvider();

        provider.setCustomParameters({
          prompt: "select_account"
       });

        await auth.signInWithPopup(provider);

        showAuthMessage("Google login successful.");
        showToast("Google login successful");

        setTimeout(() => {
          const redirect = localStorage.getItem("redirectAfterLogin");
          localStorage.removeItem("redirectAfterLogin");

          window.location.href = redirect || "index.html";
        }, 700);
      } catch (error) {
        console.error(error);
        showAuthMessage(error.message);
      }
    });

    auth.onAuthStateChanged((user) => {
      if (user) {
        console.log("Already logged in:", user.email);
      }
    });
  </script>
</body>
</html>
