<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact | Aura Ceylon</title>
  <meta name="description" content="Contact Aura Ceylon for orders, support, and inquiries." />
  <meta name="theme-color" content="#000000" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

<header class="site-header">
  <div class="container nav">
    <a href="index.html" class="brand">
      <img src="assets/logo.jpg" class="brand-logo" />
      <div class="brand-text">
        <span class="brand-name">AURA CEYLON</span>
        <span class="brand-tagline">Elegant • Timeless • Premium</span>
      </div>
    </a>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="cart.html">Cart</a>
    </nav>
  </div>
</header>

<main>

<section class="section section-dark">
  <div class="container section-head">
    <p class="section-label">Contact Us</p>
    <h1 style="font-family: 'Playfair Display'; font-size: 48px;">Get in Touch</h1>
    <p class="section-subtext">We’re here to help you with orders and inquiries.</p>
  </div>
</section>

<section class="section">
  <div class="container" style="max-width: 800px;">

    <form class="checkout-form" id="contactForm">

      <div class="form-grid">

        <div class="form-group">
          <label>Name</label>
          <input type="text" required />
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input type="text" required />
        </div>

        <div class="form-group full-width">
          <label>Email</label>
          <input type="email" />
        </div>

        <div class="form-group full-width">
          <label>Message</label>
          <textarea rows="4" required></textarea>
        </div>

      </div>

      <div class="summary-actions">
        <button class="btn btn-gold">Send Message</button>
      </div>

    </form>

  </div>
</section>

<section class="section section-dark">
  <div class="container footer-grid">

    <div>
      <h3 style="font-family: 'Playfair Display'; color: var(--gold-soft);">Contact Info</h3>
      <p>Email: info@auraceylon.com</p>
      <p>Phone: +94 77 123 4567</p>
      <p>Sri Lanka</p>
    </div>

    <div>
      <h3 style="font-family: 'Playfair Display'; color: var(--gold-soft);">Business Hours</h3>
      <p>Mon - Sat: 9AM - 6PM</p>
      <p>Sunday: Closed</p>
    </div>

  </div>
</section>

</main>

<footer class="site-footer">
  <div class="container footer-bottom">
    <p>© 2026 Aura Ceylon</p>
  </div>
</footer>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();
  showToast("Message sent! We will contact you soon.");
});
</script>

</body>
</html>
