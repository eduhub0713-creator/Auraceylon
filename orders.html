<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="assets/logo.jpg" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My Orders | Aura Ceylon</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <style>
    .orders-page {
      padding: 60px 0;
      min-height: 100vh;
    }

    .order-card {
      padding: 22px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      margin-bottom: 20px;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .order-id {
      color: var(--gold-soft);
      font-weight: 600;
    }

    .order-status {
      font-size: 13px;
      color: var(--muted);
    }

    .order-items {
      margin-top: 10px;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(212,175,55,0.08);
      font-size: 14px;
    }

    .order-total {
      margin-top: 12px;
      font-weight: 600;
      color: var(--gold-soft);
    }

    .tracking-line {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 18px;
    }

    .tracking-step {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 10px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,0.02);
    }

    .tracking-step.active {
      color: #000;
      background: linear-gradient(135deg, var(--gold-soft), var(--gold));
      border-color: var(--gold);
      font-weight: 700;
    }

    .tracking-step.cancelled {
      color: #ff6b6b;
      border-color: rgba(255, 107, 107, 0.5);
    }

    @media (max-width: 640px) {
      .tracking-line {
        grid-template-columns: 1fr;
      }
    }

    .empty-orders {
      text-align: center;
      padding: 40px 0;
      color: var(--text-soft);
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="container nav">
    <a href="index.html" class="brand">
      <img src="assets/logo.jpg" class="brand-logo" />
      <div class="brand-text">
        <span class="brand-name">AURA CEYLON</span>
        <span class="brand-tagline">Elegant • Timeless • Premium</span>
      </div>
    </a>

    <button class="menu-toggle" id="menuToggle">☰</button>

    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="profile.html">Profile</a>
      <a href="orders.html" class="active">Orders</a>
      <a href="cart.html">Cart <span id="cartCount">0</span></a>
      <span id="userArea">
        <a href="login.html">Login</a>
      </span>
    </nav>
  </div>
</header>

<main class="orders-page">
  <div class="container">
    <div class="section-head">
      <p class="section-label">My Orders</p>
      <h2>Order History</h2>
    </div>

    <div id="ordersContainer"></div>
  </div>
</main>

<footer class="site-footer">
  <div class="container footer-bottom">
    <p>© 2026 Aura Ceylon</p>
  </div>
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>

<script src="js/ui.js"></script>

<script>
const ordersContainer = document.getElementById("ordersContainer");

function formatPrice(price) {
  return `LKR ${Number(price).toLocaleString()}`;
}

function getTrackingSteps(status) {
  const steps = ["new", "processing", "packed", "shipped", "delivered"];

  if (status === "cancelled") {
    return `
      <div class="tracking-line">
        <div class="tracking-step cancelled">Cancelled</div>
      </div>
    `;
  }

  const currentIndex = steps.indexOf(status || "new");

  return `
    <div class="tracking-line">
      ${steps.map((step, index) => `
        <div class="tracking-step ${index <= currentIndex ? "active" : ""}">
          ${step.charAt(0).toUpperCase() + step.slice(1)}
        </div>
      `).join("")}
    </div>
  `;
}

function createOrderCard(order) {
  const itemsHTML = order.items.map(item => `
    <div class="order-item">
      <span>${item.name} (x${item.quantity})</span>
      <span>${formatPrice(item.price * item.quantity)}</span>
    </div>
  `).join("");

  return `
    <div class="order-card">
      <div class="order-header">
        <span class="order-id">${order.id}</span>
        <span class="order-status">${order.status || "new"}</span>
      </div>

      ${getTrackingSteps(order.status || "new")}

      <div class="order-items">
        ${itemsHTML}
      </div>

      <div class="order-total">
        Total: ${formatPrice(order.summary.total)}
      </div>
    </div>
  `;
}

async function loadOrders(user) {
  const snapshot = await db
    .collection("users")
    .doc(user.uid)
    .collection("orders")
    .orderBy("createdAt", "desc")
    .get();

  if (snapshot.empty) {
    ordersContainer.innerHTML = `
      <div class="empty-orders">
        <h3>No orders yet</h3>
        <p>Start shopping to see your orders here.</p>
      </div>
    `;
    return;
  }

  const orders = snapshot.docs.map(doc => doc.data());

  ordersContainer.innerHTML = orders.map(createOrderCard).join("");
}

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  try {
    await loadOrders(user);
  } catch (err) {
    console.error(err);
    ordersContainer.innerHTML = "<p>Error loading orders.</p>";
  }
});

protectPage({ requireAuth: true });
</script>

</body>
</html>
