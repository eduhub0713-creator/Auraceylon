<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline | Aura Ceylon</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/offline.css" />

  <meta name="theme-color" content="#000000" />
</head>
<body>

  <main class="offline-wrapper">
    <div class="offline-card">

      <img src="assets/logo.jpg" alt="Aura Ceylon Logo" class="offline-logo" />

      <h1>You are offline</h1>

      <p>
        It looks like your internet connection is not available.
        Please check your connection and try again.
      </p>

      <button onclick="location.reload()" class="btn btn-gold">
        Retry
      </button>

      <a href="index.html" class="btn btn-outline">
        Go to Home
      </a>

    </div>
  </main>

</body>
</html>
